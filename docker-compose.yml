services:
  nhstt-door-system-web:
    container-name: door-system-web
    build: ./web
    ports:
      - "3004:80"
    restart: unless-stopped
    networks:
      - nhstt-door-system
    environment:
      DB_HOST: 192.168.1.21
      DB_NAME: door_dev
      DB_USER: root
      DB_PASS: Superce11ular!
      LDAP_HOST: "ldaps://192.168.1.251"
      LDAP_DN: "DC=techteam,DC=local"
      MQTT_URL: "mqtt://192.168.1.21:9001/mqtt"
      MQTT_USERNAME: "admin"
      MQTT_PASSWORD: "superce11"
  node-red:
    image: nodered/node-red:latest
    container-name: node-red
    environment:
      - TZ=America/New_York
    ports:
      - "1880:1880"
    networks:
      - nhstt-door-system
    volumes:
      - ./nodered/data:/data
    #This allows the container to talk to the Arduino for RFID and the USB relay
    devices:
      - "/dev/ttyACM0:/dev/ttyACM0"
      - "/dev/hidraw0:/dev/hidraw0"

    #permission stuff b/c its locked down by default
    group_add:
      - "20"   # replace with your dialout GID
    privileged: true
  mqtt:
    image: eclipse-mosquitto:2
    container-name: mqtt
    restart: unless-stopped
    ports:
      - "1883:1883"
    networks:
      - nhstt-door-system
    volumes:
      - ./mqtt/config:/mosquitto/config
    environment:
      MQTT_USERNAME: "admin"
      MQTT_PASSWORD: "superce11"
    entrypoint: >
      sh -c "
      mosquitto_passwd -b -c /mosquitto/config/passwords.txt
      $$MQTT_USERNAME $$MQTT_PASSWORD &&
      exec mosquitto -c /mosquitto/config/mosquitto.conf
      "

networks:
  nhstt-door-system: